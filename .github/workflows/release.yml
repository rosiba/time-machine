name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../time_machine-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: time_machine-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package macOS DMG
        run: |
          mkdir -p dist_mac
          cp -r build/macos/Build/Products/Release/*.app dist_mac/
          hdiutil create \
            -volname "Time Machine" \
            -srcfolder dist_mac \
            -ov -format UDZO \
            time_machine-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: time_machine-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Build Windows installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows\time_machine-windows-x64-setup.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            time_machine-linux-x64.tar.gz
            time_machine-macos.dmg
            time_machine-windows-x64-setup.exe
