name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            rpm

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Extract version
        id: ver
        run: echo "val=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package generic tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../time_machine-linux-x64.tar.gz .

      - name: Package Debian (.deb)
        run: |
          VER=${{ steps.ver.outputs.val }}
          PKG="time-machine_${VER}_amd64"
          mkdir -p "$PKG/DEBIAN" \
                   "$PKG/usr/lib/time_machine" \
                   "$PKG/usr/bin" \
                   "$PKG/usr/share/applications" \
                   "$PKG/usr/share/icons/hicolor/256x256/apps"

          cp -r build/linux/x64/release/bundle/* "$PKG/usr/lib/time_machine/"

          printf '#!/bin/bash\nexec /usr/lib/time_machine/time_machine "$@"\n' \
              > "$PKG/usr/bin/time_machine"
          chmod +x "$PKG/usr/bin/time_machine"

          cp packaging/time_machine.desktop "$PKG/usr/share/applications/"
          cp assets/icon/icon.png \
              "$PKG/usr/share/icons/hicolor/256x256/apps/time_machine.png"

          sed "s/VERSION/$VER/" packaging/debian/control > "$PKG/DEBIAN/control"

          dpkg-deb --build "$PKG" "time_machine-${VER}-linux-amd64.deb"

      - name: Package RPM (.rpm)
        run: |
          VER=${{ steps.ver.outputs.val }}

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SPECS,SRPMS}
          cp -r build/linux/x64/release/bundle ~/rpmbuild/BUILD/
          cp packaging/time_machine.desktop ~/rpmbuild/BUILD/
          cp assets/icon/icon.png ~/rpmbuild/BUILD/

          sed "s/VERSION/$VER/" packaging/rpm/time_machine.spec \
              > ~/rpmbuild/SPECS/time_machine.spec

          rpmbuild -bb ~/rpmbuild/SPECS/time_machine.spec

          cp ~/rpmbuild/RPMS/x86_64/time-machine-*.rpm \
              "time_machine-${VER}-linux-x86_64.rpm"

      - name: Package Arch Linux (.pkg.tar.zst)
        run: |
          VER=${{ steps.ver.outputs.val }}

          mkdir -p arch_pkg
          tar -czf "arch_pkg/time-machine-${VER}.tar.gz" \
              -C build/linux/x64/release bundle
          cp packaging/time_machine.desktop arch_pkg/
          cp assets/icon/icon.png arch_pkg/
          sed "s/PKGVER/$VER/" packaging/arch/PKGBUILD > arch_pkg/PKGBUILD

          docker run --rm \
            -v "$PWD/arch_pkg:/workspace" \
            archlinux:base-devel \
            bash -c "
              useradd -m builder
              chown -R builder:builder /workspace
              cd /workspace && su builder -c 'makepkg --noconfirm --nodeps'
            "

          cp arch_pkg/time-machine-*.pkg.tar.zst \
              "time_machine-${VER}-linux-x86_64.pkg.tar.zst"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: time_machine-linux-x64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: "*.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arch
          path: "*.pkg.tar.zst"

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Package macOS DMG
        run: |
          mkdir -p dist_mac
          cp -r build/macos/Build/Products/Release/*.app dist_mac/
          hdiutil create \
            -volname "Time Machine" \
            -srcfolder dist_mac \
            -ov -format UDZO \
            time_machine-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: time_machine-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Build Windows installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows\time_machine-windows-x64-setup.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-tarball

      - uses: actions/download-artifact@v4
        with:
          name: linux-deb

      - uses: actions/download-artifact@v4
        with:
          name: linux-rpm

      - uses: actions/download-artifact@v4
        with:
          name: linux-arch

      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            time_machine-linux-x64.tar.gz
            *.deb
            *.rpm
            *.pkg.tar.zst
            time_machine-macos.dmg
            time_machine-windows-x64-setup.exe
