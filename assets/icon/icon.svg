<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="face" x1="512" y1="268" x2="512" y2="868" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle top-left highlight -->
  <ellipse cx="340" cy="280" rx="300" ry="220" fill="white" fill-opacity="0.07"/>

  <!-- Stopwatch crown stem -->
  <rect x="480" y="186" width="64" height="82" rx="20" fill="white" fill-opacity="0.92"/>

  <!-- Crown button -->
  <circle cx="512" cy="172" r="40" fill="white" fill-opacity="0.92"/>

  <!-- Play arrow inside crown button -->
  <polygon points="500,157 500,187 528,172" fill="#4338CA" opacity="0.85"/>

  <!-- Clock outer glow ring -->
  <circle cx="512" cy="578" r="326" fill="white" fill-opacity="0.10" filter="url(#shadow)"/>

  <!-- Clock face -->
  <circle cx="512" cy="578" r="298" fill="url(#face)"/>

  <!-- Hour tick marks at 12, 3, 6, 9 -->
  <!-- 12 o'clock: centered at (512, 280), pointing inward -->
  <rect x="499" y="282" width="26" height="58" rx="13" fill="#4338CA" opacity="0.8"/>
  <!-- 3 o'clock: centered at (810, 578) -->
  <rect x="752" y="565" width="58" height="26" rx="13" fill="#4338CA" opacity="0.8"/>
  <!-- 6 o'clock: centered at (512, 876) -->
  <rect x="499" y="818" width="26" height="58" rx="13" fill="#4338CA" opacity="0.8"/>
  <!-- 9 o'clock: centered at (214, 578) -->
  <rect x="214" y="565" width="58" height="26" rx="13" fill="#4338CA" opacity="0.8"/>

  <!-- Minor tick marks (every 30°, except where major marks are) -->
  <!-- 1 o'clock: 30° from 12 -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(30 512 578)"/>
  <!-- 2 o'clock: 60° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(60 512 578)"/>
  <!-- 4 o'clock: 120° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(120 512 578)"/>
  <!-- 5 o'clock: 150° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(150 512 578)"/>
  <!-- 7 o'clock: 210° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(210 512 578)"/>
  <!-- 8 o'clock: 240° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(240 512 578)"/>
  <!-- 10 o'clock: 300° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(300 512 578)"/>
  <!-- 11 o'clock: 330° -->
  <rect x="651" y="312" width="14" height="38" rx="7" fill="#4338CA" opacity="0.35"
        transform="rotate(330 512 578)"/>

  <!-- Hour hand — pointing to ~10 o'clock
       10:00 = 300° from east = angle from 12 is -60°
       tip: (512 + 175*cos(210°), 578 + 175*sin(210°))
            = (512 - 151.6, 578 - 87.5) = (360, 490) -->
  <line x1="512" y1="578" x2="360" y2="490"
        stroke="#4338CA" stroke-width="34" stroke-linecap="round"/>

  <!-- Minute hand — pointing to 12
       tip: (512, 578 - 248) = (512, 330) -->
  <line x1="512" y1="578" x2="512" y2="330"
        stroke="#4338CA" stroke-width="24" stroke-linecap="round"/>

  <!-- Second hand — pointing to ~2 o'clock (60° from 12)
       tip: (512 + 260*sin(60°), 578 - 260*cos(60°)) = (512+225, 578-130) = (737, 448)
       tail: opposite direction, shorter -->
  <line x1="512" y1="578" x2="737" y2="448"
        stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  <line x1="512" y1="578" x2="421" y2="630"
        stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>

  <!-- Center cap -->
  <circle cx="512" cy="578" r="22" fill="#4338CA"/>
  <circle cx="512" cy="578" r="10" fill="white"/>
</svg>
