name: time_machine
description: Time tracker for freelancers.
publish_to: 'none'
version: 1.1.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  image_path: 'assets/icon/icon.png'
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: 'assets/icon/icon.png'
  linux:
    generate: true
    image_path: 'assets/icon/icon.png'
  windows:
    generate: true
    image_path: 'assets/icon/icon.png'
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png
